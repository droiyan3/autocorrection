<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Autocorrection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0e1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #7d8590; --accent: #58a6ff;
    --green: #2ea043; --green-bg: #2ea04322;
    --red: #f85149; --red-bg: #f8514922;
    --orange: #d29922; --orange-bg: #d2992233;
    --today-glow: #58a6ff18;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Space Mono', 'Courier New', monospace;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100%;
  }

  /* COMPACT HEADER - one line */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .header-date { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .header-tabs { display: flex; gap: 6px; }
  .tab-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 14px; font-size: 11px;
    font-family: 'Space Mono', monospace; cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* TIME NAV - compact */
  .time-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .tn-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: monospace;
  }
  .tn-btn:active { background: var(--border); }
  .tn-label { font-size: 12px; font-weight: 700; }
  .tn-today {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 3px 10px; border-radius: 10px; font-size: 10px;
    font-family: 'Space Mono', monospace; cursor: pointer; font-weight: 700;
  }

  /* GRID - fills remaining space */
  .grid-wrap {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
  }
  .grid-container {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .grid-table {
    border-collapse: separate; border-spacing: 0;
    width: 100%; height: 100%;
    table-layout: fixed;
  }
  .grid-table th, .grid-table td { text-align: center; padding: 0; vertical-align: middle; }

  /* Date header cells */
  .date-cell { padding: 6px 2px; font-weight: 400; }
  .date-cell .day-name {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
  }
  .date-cell .day-num {
    display: block; font-size: 20px; font-weight: 700; color: var(--text); margin-top: 2px;
  }
  .date-cell.is-today .day-num {
    background: var(--accent); color: #fff;
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .date-cell.is-past { opacity: 0.5; }

  /* Task name column */
  .task-cell {
    position: sticky; left: 0; background: var(--bg); z-index: 10;
    text-align: left; padding: 6px 10px;
    border-right: 1px solid var(--border); cursor: pointer;
    width: 130px; min-width: 130px; max-width: 130px;
  }
  .task-cell:active { background: var(--surface); }
  .task-label { font-size: 13px; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-freq { font-size: 10px; color: var(--text-dim); margin-top: 2px; display: block; }
  .streak-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 6px; margin-top: 3px;
    background: var(--green-bg); color: var(--green);
  }

  /* Grid data cells */
  .g-cell { padding: 4px; }
  .g-cell.today-col { background: var(--today-glow); }

  .cell {
    width: 42px; height: 42px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto; cursor: pointer; transition: all 0.12s;
  }
  .cell.not-due { cursor: default; }
  .cell.not-due .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }

  .cell.due { background: var(--surface); border: 2.5px solid var(--accent); }
  .cell.due:active { transform: scale(0.9); }

  .cell.done { background: var(--green); border: 2.5px solid var(--green); }
  .cell.done svg { width: 20px; height: 20px; }

  .cell.missed { background: var(--red-bg); border: 2.5px solid var(--red); }

  .cell.carry {
    background: var(--orange-bg); border: 2.5px solid var(--orange);
    -webkit-animation: pulse 2.5s ease-in-out infinite;
    animation: pulse 2.5s ease-in-out infinite;
  }

  .cell.next-due {
    background: transparent; border: 2.5px solid var(--accent);
    -webkit-box-shadow: 0 0 10px var(--accent);
    box-shadow: 0 0 10px var(--accent);
    cursor: default;
  }

  .cell.future { background: transparent; border: 2.5px dashed var(--border); cursor: default; opacity: 0.4; }
  .cell.past-done { background: var(--green); border: 2.5px solid var(--green); opacity: 0.5; }

  @-webkit-keyframes pulse {
    0%, 100% { -webkit-box-shadow: 0 0 0 0 transparent; }
    50% { -webkit-box-shadow: 0 0 0 5px rgba(210,153,34,0.2); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 transparent; }
    50% { box-shadow: 0 0 0 5px rgba(210,153,34,0.2); }
  }

  /* DETAIL SHEET */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    -webkit-transition: opacity 0.2s; transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; width: 100%; max-width: 500px;
    max-height: 70vh; overflow-y: auto; padding: 20px 18px 30px;
    -webkit-transform: translateY(100%); transform: translateY(100%);
    -webkit-transition: -webkit-transform 0.25s; transition: transform 0.25s;
  }
  .overlay.open .sheet { -webkit-transform: translateY(0); transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }
  .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .sheet-sec { margin-bottom: 14px; }
  .sheet-lbl { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .sheet-txt { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .sheet-close {
    width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; font-family: 'Space Mono', monospace;
    font-size: 13px; cursor: pointer; margin-top: 8px;
  }

  /* STREAKS VIEW */
  .streaks-view { padding: 14px; display: none; overflow-y: auto; flex: 1; }
  .s-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .s-title { font-size: 14px; font-weight: 700; }
  .s-row { display: flex; justify-content: space-between; margin-top: 10px; }
  .s-stat { text-align: center; }
  .s-stat .num { font-size: 22px; font-weight: 700; }
  .s-stat .lbl { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .s-stat .num.green { color: var(--green); }
  .s-stat .num.orange { color: var(--orange); }
  .heat { display: flex; gap: 3px; margin-top: 10px; }
  .heat .hd { width: 10px; height: 10px; border-radius: 2px; background: var(--border); }
  .heat .hd.done { background: var(--green); }
  .heat .hd.missed { background: var(--red); }
  .heat .hd.nd { opacity: 0.3; }

  /* DATA VIEW */
  .data-view { padding: 14px; display: none; overflow-y: auto; flex: 1; }
  .d-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 14px; border-radius: 10px; font-size: 13px;
    font-family: 'Space Mono', monospace; cursor: pointer;
    text-align: left; width: 100%; margin-bottom: 10px;
  }
  .d-btn:active { background: var(--border); }
  .d-btn .sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; display: block; }
  .d-ta {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: monospace; font-size: 11px;
    padding: 10px; border-radius: 8px; margin-bottom: 10px; min-height: 90px; display: none;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeD(event)">
  <div class="sheet"><div class="sheet-handle"></div>
    <div class="sheet-title" id="shTitle"></div>
    <div id="shContent"></div>
    <button class="sheet-close" onclick="closeDF()">Close</button>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <h1>// autocorrection</h1>
    <span class="header-date" id="todayLabel"></span>
  </div>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="showV('grid')">Grid</button>
    <button class="tab-btn" onclick="showV('streaks')">Streaks</button>
    <button class="tab-btn" onclick="showV('data')">Data</button>
  </div>
</div>

<div id="gridView" class="grid-wrap">
  <div class="time-nav">
    <button class="tn-btn" onclick="shift(-7)">&larr;</button>
    <span class="tn-label" id="rangeLabel"></span>
    <button class="tn-today" onclick="goT()">TODAY</button>
    <button class="tn-btn" onclick="shift(7)">&rarr;</button>
  </div>
  <div class="grid-container">
    <table class="grid-table" id="grid"></table>
  </div>
</div>

<div id="streaksView" class="streaks-view"></div>

<div id="dataView" class="data-view">
  <button class="d-btn" onclick="expJSON()">Export JSON<span class="sub">Full backup to clipboard</span></button>
  <button class="d-btn" onclick="expCSV()">Export CSV<span class="sub">For spreadsheet analysis</span></button>
  <button class="d-btn" onclick="showImp()">Import JSON<span class="sub">Restore from backup</span></button>
  <textarea class="d-ta" id="impArea" placeholder="Paste JSON here..."></textarea>
  <button class="d-btn" id="impBtn" style="display:none;background:var(--green);border-color:var(--green)" onclick="doImp()">Confirm Import</button>
  <button class="d-btn" onclick="doReset()" style="border-color:var(--red);color:var(--red)">Reset All<span class="sub">Clear everything. Cannot be undone.</span></button>
</div>

<script>
// NO TEST MODE - uses real date
var DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

var LOOPS = [
  { id:'laundry', name:'Wash Clothes', freq:'Every 2 days', cy:2, icon:'\u{1F9FA}',
    goal:'Wash every second day. Every dry load gets folded and put away before the next load goes on.',
    gr:"Clothes don't stay on the rack or bed for more than one day.",
    gb:'Dry clothes sitting on rack or bed for 2+ days.',
    it:"If clothes are dry and it's 9 PM, stop and put them away (10 min). Next wash forces you to clear the rack.",
    cr:"If you can't put them away now, they go into a single designated basket \u2014 not the bed."
  },
  { id:'clothes', name:'Clothes to Wardrobe', freq:'Daily', cy:1, icon:'\u{1F455}',
    goal:'Every night after showering, dirty clothes to laundry room, not-dirty clothes to designated spot.',
    gr:'No clothes accumulate in the bathroom or on the bed overnight.',
    gb:'Clothes sitting in bathroom or on bed for more than one night.',
    it:'After shower, get dressed for bed. Before getting into bed: dirty to laundry room, not-dirty to spot. 2 minutes.',
    cr:'If too tired, dirty clothes go into basket by bedroom door \u2014 move them first thing in the morning.'
  },
  { id:'trash', name:'Trash Out', freq:'Daily', cy:1, icon:'\u{1F5D1}',
    goal:'Take trash out every day when leaving the house. One bag per day, no accumulation.',
    gr:'Trash goes out minimum on MWF (gym days). Never sits more than 2 days.',
    gb:"Trash hasn't gone out for 3+ days.",
    it:'Before leaving for gym on MWF, grab trash on your way out. Other days, take it when leaving.',
    cr:"If rushing and forgot, it goes out when you get home \u2014 don't let it roll to next day."
  },
  { id:'litter', name:'Change Litter', freq:'Every 3 days', cy:3, icon:'\u{1F431}',
    goal:'Full litter change every 3 days.',
    gr:'Never goes longer than 4 days.',
    gb:'5+ days without a change.',
    it:'Every 3 days, before leaving the house, change the litter. 5 minutes.',
    cr:'If you miss day 3, it gets done on day 4 \u2014 no exceptions.'
  },
  { id:'vacuum', name:'Vacuum', freq:'2x / week', cy:3, icon:'\u{1F9F9}',
    goal:'Vacuum twice per week.',
    gr:'Vacuum at least once per week.',
    gb:'A full week passes with no vacuum.',
    it:'Pick 2 specific days. If done together with dusting, 15 min instead of 30.',
    cr:'If the scheduled day gets missed, it must happen the next day.'
  },
  { id:'dust', name:'Dusting', freq:'Weekly', cy:7, icon:'\u{2728}',
    goal:'Dust once per week.',
    gr:'At least once every two weeks.',
    gb:'2 weeks pass with no dusting.',
    it:'Pick one specific day. Dashboard shows it.',
    cr:'If scheduled day gets missed, it must happen the next day.'
  }
];

var SK='ac_v7', vOff=0, state;

// Clear old versions
var oldKeys = ['autocorrect_data_v1','autocorrect_v2','autocorrect_v3','autocorrect_v4','autocorrect_v5','autocorrect_v6'];
for (var k=0;k<oldKeys.length;k++) localStorage.removeItem(oldKeys[k]);

function td() { return new Date().toISOString().split('T')[0]; }
function aD(s,n) { var d=new Date(s+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function dD(a,b) { return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000); }

// Safe day name - no toLocaleDateString
function dayName(s) { return DAYS[new Date(s+'T12:00:00').getDay()]; }
function dayNum(s) { return new Date(s+'T12:00:00').getDate(); }
function fmtMD(s) {
  var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d=new Date(s+'T12:00:00');
  return m[d.getMonth()]+' '+d.getDate();
}
function fmtFull(s) {
  var dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var m=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var d=new Date(s+'T12:00:00');
  return dn[d.getDay()]+', '+m[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function load() { try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){} return fresh(); }
function fresh() { var a={};for(var i=0;i<LOOPS.length;i++)a[LOOPS[i].id]=td();return{anchors:a,checks:{}}; }
function save() { localStorage.setItem(SK,JSON.stringify(state)); }

function effAnch(lp,asOf) {
  var anc=state.anchors[lp.id],lat=anc,pfx=lp.id+'_';
  for(var k in state.checks){if(k.indexOf(pfx)===0&&state.checks[k]){var d=k.substring(pfx.length);if(d<=asOf&&d>lat)lat=d;}}
  return lat;
}

function isDue(lp,ds) { var a=effAnch(lp,ds),df=dD(a,ds); return df>=0&&df%lp.cy===0; }
function isChk(lid,ds) { return state.checks[lid+'_'+ds]===true; }

function prevDue(lp,ds) { for(var i=1;i<=lp.cy*3;i++){var d=aD(ds,-i);if(isDue(lp,d))return d;} return null; }

function isCarry(lp,ds) {
  var t=td(); if(ds>t||isDue(lp,ds))return false;
  var p=prevDue(lp,ds); return p?!isChk(lp.id,p):false;
}

function nextDue(lp) { var t=td();for(var i=1;i<=30;i++){var d=aD(t,i);if(isDue(lp,d))return d;}return null; }

function doChk(lid,ds) { state.checks[lid+'_'+ds]=!state.checks[lid+'_'+ds]; save(); renderGrid(); }

function calcStr(lp) {
  var t=td(),cur=0,lon=0,tot=0,tdu=0,tmp=0;
  for(var i=90;i>=0;i--){var d=aD(t,-i);if(!isDue(lp,d))continue;tdu++;if(isChk(lp.id,d)){tot++;tmp++;if(tmp>lon)lon=tmp;}else tmp=0;}
  for(var i=0;i<=90;i++){var d=aD(t,-i);if(!isDue(lp,d))continue;if(d===t&&!isChk(lp.id,d))continue;if(isChk(lp.id,d))cur++;else break;}
  return{cur:cur,lon:lon,tot:tot,tdu:tdu,rate:tdu>0?Math.round(tot/tdu*100):0};
}

// --- GRID ---
function renderGrid() {
  var t=td(), start=aD(t,vOff-2), days=[];
  for(var i=0;i<7;i++) days.push(aD(start,i));

  document.getElementById('rangeLabel').textContent=fmtMD(days[0])+' \u2014 '+fmtMD(days[6]);

  var nds={};
  for(var i=0;i<LOOPS.length;i++){var n=nextDue(LOOPS[i]);if(n)nds[LOOPS[i].id]=n;}

  var h='<thead><tr><th class="task-cell" style="border-bottom:1px solid var(--border)"></th>';
  for(var i=0;i<days.length;i++){
    var d=days[i],c='date-cell';
    if(d===t)c+=' is-today'; else if(d<t)c+=' is-past';
    h+='<th class="'+c+'"><span class="day-name">'+dayName(d)+'</span><span class="day-num">'+dayNum(d)+'</span></th>';
  }
  h+='</tr></thead><tbody>';

  for(var li=0;li<LOOPS.length;li++){
    var lp=LOOPS[li],st=calcStr(lp);
    h+='<tr><td class="task-cell" onclick="openD(\''+lp.id+'\')">';
    h+='<span class="task-label">'+lp.icon+' '+lp.name+'</span>';
    h+='<span class="task-freq">'+lp.freq+'</span>';
    if(st.cur>0)h+='<span class="streak-badge">\u{1F525} '+st.cur+'</span>';
    h+='</td>';

    for(var di=0;di<days.length;di++){
      var d=days[di],isT=d===t,isF=d>t,isP=d<t;
      var due=isDue(lp,d),chk=isChk(lp.id,d),car=isCarry(lp,d),isN=nds[lp.id]===d;

      h+='<td class="g-cell'+(isT?' today-col':'')+'">';

      if(chk){
        h+='<div class="cell '+(isP?'past-done':'done')+'" onclick="doChk(\''+lp.id+'\',\''+d+'\')">';
        h+='<svg fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
      }else if(due&&isP){
        h+='<div class="cell missed" onclick="doChk(\''+lp.id+'\',\''+d+'\')">';
        h+='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--red)" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg></div>';
      }else if(car){
        h+='<div class="cell carry" onclick="doChk(\''+lp.id+'\',\''+d+'\')">';
        h+='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--orange)" stroke-width="2.5"><path d="M12 9v4" stroke-linecap="round"/><circle cx="12" cy="16" r="0.5" fill="var(--orange)" stroke="none"/></svg></div>';
      }else if(due&&isT){
        h+='<div class="cell due" onclick="doChk(\''+lp.id+'\',\''+d+'\')"></div>';
      }else if(isN&&isF){
        h+='<div class="cell next-due"></div>';
      }else if(due&&isF){
        h+='<div class="cell future"></div>';
      }else{
        h+='<div class="cell not-due"><div class="dot"></div></div>';
      }
      h+='</td>';
    }
    h+='</tr>';
  }
  h+='</tbody>';
  document.getElementById('grid').innerHTML=h;
}

// --- DETAIL ---
function openD(lid){
  var lp;for(var i=0;i<LOOPS.length;i++)if(LOOPS[i].id===lid)lp=LOOPS[i];
  if(!lp)return;
  document.getElementById('shTitle').textContent=lp.icon+' '+lp.name;
  var s=calcStr(lp),n=nextDue(lp),h='';
  h+=sec('Goal',lp.goal)+sec('Guard Rail',lp.gr)+sec('Guard Rail Break',lp.gb);
  h+=sec('If-Then Trigger',lp.it)+sec('Correction Rule',lp.cr);
  if(n)h+=sec('Next Due',fmtFull(n));
  h+=sec('Current Streak',s.cur+' in a row');
  h+=sec('Completion Rate',s.rate+'% ('+s.tot+'/'+s.tdu+')');
  document.getElementById('shContent').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
}
function sec(l,t){return'<div class="sheet-sec"><div class="sheet-lbl">'+l+'</div><div class="sheet-txt">'+t+'</div></div>';}
function closeD(e){if(e.target===document.getElementById('overlay'))closeDF();}
function closeDF(){document.getElementById('overlay').classList.remove('open');}

// --- STREAKS ---
function renderStr(){
  var t=td(),h='';
  for(var i=0;i<LOOPS.length;i++){
    var lp=LOOPS[i],s=calcStr(lp);
    h+='<div class="s-card"><div class="s-title">'+lp.icon+' '+lp.name+'</div><div class="s-row">';
    h+='<div class="s-stat"><div class="num green">'+s.cur+'</div><div class="lbl">Current</div></div>';
    h+='<div class="s-stat"><div class="num orange">'+s.lon+'</div><div class="lbl">Best</div></div>';
    h+='<div class="s-stat"><div class="num">'+s.rate+'%</div><div class="lbl">Rate</div></div>';
    h+='<div class="s-stat"><div class="num">'+s.tot+'/'+s.tdu+'</div><div class="lbl">Done</div></div>';
    h+='</div><div class="heat">';
    for(var j=27;j>=0;j--){var d=aD(t,-j);if(!isDue(lp,d))h+='<div class="hd nd"></div>';else if(isChk(lp.id,d))h+='<div class="hd done"></div>';else h+='<div class="hd missed"></div>';}
    h+='</div></div>';
  }
  document.getElementById('streaksView').innerHTML=h;
}

// --- NAV ---
function shift(n){vOff+=n;renderGrid();}
function goT(){vOff=0;renderGrid();}

function showV(v){
  document.getElementById('gridView').style.display=v==='grid'?'flex':'none';
  document.getElementById('streaksView').style.display=v==='streaks'?'block':'none';
  document.getElementById('dataView').style.display=v==='data'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&v==='grid')||(i===1&&v==='streaks')||(i===2&&v==='data'));
  });
  if(v==='streaks')renderStr();
}

// --- DATA ---
function expJSON(){var j=JSON.stringify(state,null,2);if(navigator.clipboard)navigator.clipboard.writeText(j).then(function(){alert('JSON copied!');});else prompt('Copy:',j);}
function expCSV(){
  var t=td(),rows=['date,task,frequency,status'];
  for(var i=90;i>=0;i--){var d=aD(t,-i);for(var li=0;li<LOOPS.length;li++){var lp=LOOPS[li];var du=isDue(lp,d),ch=isChk(lp.id,d);rows.push(d+','+lp.name+',"'+lp.freq+'",'+(ch?'done':du?'missed':'not_due'));}}
  var csv=rows.join('\n');if(navigator.clipboard)navigator.clipboard.writeText(csv).then(function(){alert('CSV copied!');});else prompt('Copy:',csv);
}
function showImp(){var t=document.getElementById('impArea'),b=document.getElementById('impBtn');t.style.display=t.style.display==='none'?'block':'none';b.style.display=b.style.display==='none'?'block':'none';}
function doImp(){try{var d=JSON.parse(document.getElementById('impArea').value);if(d.checks&&d.anchors){state=d;save();renderGrid();alert('Done!');}else alert('Invalid.');}catch(e){alert('Error:'+e.message);}}
function doReset(){if(confirm('Delete ALL history?')&&confirm('Sure?')){state=fresh();save();vOff=0;renderGrid();renderStr();}}

// --- INIT ---
state=load();
document.getElementById('todayLabel').textContent=fmtFull(td());
renderGrid();
</script>
</body>
</html>
